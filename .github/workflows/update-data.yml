name: Update SCOTUS Voting Data

on:
  schedule:
    # Run every day at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:   # Allow manual trigger from the Actions tab
  push:
    paths:
      - 'scripts/scrape.py'

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed to commit updated data back to the repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/decisions.json
          # Only commit if the file actually changed
          git diff --staged --quiet || git commit -m "chore: update SCOTUS voting data [skip ci]"
          git push
